<html>
    <body>
        <p>We use Strings() to convert, search and replace strings</p>
        <p id="demo"></p>
        <p id="demo1"></p>
        <script>
            var x = 50;
            var y = 90;

            document.getElementById("demo").innerHTML = x + y;
            document.getElementById("demo1").innerHTML = String(x) + String(y);

        </script>
    </body>

</html>
